<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>Course Management</h2>
        <button class="btn-create" (click)="createCourse()">+ Create Course</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>

            <thead>
                <tr>
                    <th>Course ID</th>
                    <th>Name</th>
                    <th>Duration</th>
                    <th class="hide-mobile">Video</th>
                    <th>Status</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let courses of courseData; let i = index">

                    <td>{{ i + 1 }}</td>
                    <td>{{courses.coursename}}</td>
                    <td>{{courses.courseDuration}}</td>
                    <td class="hide-mobile">{{courses.videoRecording}}</td>

                    <td>
                        <span class="status"
                              [ngClass]="courses.status === 'ACTIVE' ? 'active' : 'inactive'">
                            {{courses.status}}
                        </span>
                    </td>

                    <td>
                        <button class="btn-edit" (click)="editCourse(courses.courseid)"><i class="fa fa-edit"></i></button>
                    </td>

                    <td>
                        <button class="btn-delete" (click)="remove(courses.courseid)"><i class="fa fa-close"></i></button>
                    </td>

                </tr>

                <tr *ngIf="courseData?.length === 0">
                    <td colspan="7" class="no-data">No Courses Available</td>
                </tr>

            </tbody>

        </table>
    </div>

</div>
