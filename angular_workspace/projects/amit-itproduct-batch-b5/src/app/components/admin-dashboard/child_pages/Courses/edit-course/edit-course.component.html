<!-- Update Popup -->
<div class="popup-overlay" *ngIf="isEditMode">

  <div class="popup-card">

    <h2 class="form-title">Update Course</h2>

    <form  >

      <div class="form-group">
        <label>Course Name</label>
        <input type="text" formControlName="coursename">
      </div>

      <div class="form-group">
        <label>Course Duration</label>
        <input type="text" formControlName="courseDuration">
      </div>

      <div class="form-group">
        <label>Video Recording</label>
        <select formControlName="videoRecording">
          <option [value]="true">Yes</option>
          <option [value]="false">No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select formControlName="status">
          <option value="ACTIVE">Active</option>
          <option value="INACTIVE">Inactive</option>
        </select>
      </div>

      <div class="btn-group">
        <button type="submit" class="submit-btn">Update</button>
        <button type="button" class="cancel-btn" (click)="closePopup()">Cancel</button>
      </div>

    </form>

  </div>

</div>
