<div class="popup-overlay">
  <div class="popup-card">
    
    <h2 class="form-title">Create Course</h2>

    <form [formGroup]="courseForm" (ngSubmit)="saveCourse(courseForm.value)">

      <div class="form-group">
        <label>Course Name</label>
        <input type="text" formControlName="coursename" placeholder="Enter course name">
      </div>

      <div class="form-group">
        <label>Course Duration</label>
        <input type="text" formControlName="courseDuration" placeholder="e.g. 3 Months">
      </div>

      <div class="form-group">
        <label>Video Recording</label>
        <select formControlName="videoRecording">
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select formControlName="status">
          <option value="ACTIVE">Active</option>
          <option value="INACTIVE">Inactive</option>
        </select>
      </div>

      <button class="submit-btn">Create Course</button>

    </form>

  </div>
</div>
