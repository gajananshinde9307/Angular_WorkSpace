<div class="home_container">
    <div class="Succsee_message" *ngIf="messagebox">
        <span>{{successMessage}}</span>
        <span>{{errorMessage}}</span>
        <button (click)="removeBox()">Ok</button>
    </div>
    <!-- SignUp form -->
    <div class="auth-container" *ngIf="switchForm">
        <div class="auth-card">
            <h2>Create Account</h2>

            <form [formGroup]="signUpForm" (ngSubmit)="signUp(signUpForm.value)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter name" name="username" formControlName="username" />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter email" name="email" formControlName="email" />
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="email" placeholder="Enter Mobile Number" formControlName="mobileNo" name="mobileNo" />
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" name="password" formControlName="password" />
                </div>

                <button class="btn-primary">Signup</button>

                <p class="switch-text">
                    Already have account?
                    <a (click)="switch_form()">Login</a>
                </p>
            </form>
        </div>
    </div>
    <!-- login form -->
    <div class="auth-container" *ngIf="!switchForm">
        <div class="auth-card">
            <h2>Login</h2>

            <form [formGroup]="loginForm" (ngSubmit)="login(loginForm.value)">
                <div class="form-group">
                    <label>User Name</label>
                    <input type="username" placeholder="Enter User Name" formControlName="username" name="username" />
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" formControlName="password" name="password" />
                </div>

                <button class="btn-primary" [disabled]="loginForm.invalid">Login</button>

                <p class="switch-text">
                    Don't have account?
                    <a (click)="switch_form()">Signup</a>
                </p>
            </form>
        </div>
    </div>
</div>
